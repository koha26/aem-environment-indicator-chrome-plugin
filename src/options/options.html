<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AEM Environment Highlighter — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <h1 class="page-title">AEM Environment Highlighter</h1>

    <!-- Global Features -->
    <section class="accordion-section" id="section-features">
      <button class="accordion-header" aria-expanded="true" data-target="body-features">
        Global Features
        <span class="accordion-arrow">▾</span>
      </button>
      <div class="accordion-body" id="body-features">
        <div class="features-list">
          <div class="feature-row">
            <div class="row-icon" style="background:rgba(45,157,120,0.1);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2D9D78" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/>
              </svg>
            </div>
            <div class="row-text">
              <div class="row-title">Tab badge</div>
              <div class="row-sub">Show D / S / P in browser tab</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="feat-badge">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="feature-row">
            <div class="row-icon" style="background:rgba(20,115,230,0.1);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1473E6" stroke-width="2.5">
                <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/>
              </svg>
            </div>
            <div class="row-text">
              <div class="row-title">Favicon overlay</div>
              <div class="row-sub">Colour-tint the tab favicon</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="feat-favicon">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="feature-row">
            <div class="row-icon" style="background:rgba(230,134,25,0.1);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E68619" stroke-width="2.5">
                <path d="M4 6h16M4 12h10M4 18h7"/>
              </svg>
            </div>
            <div class="row-text">
              <div class="row-title">Title prefix</div>
              <div class="row-sub">Prepend [DEV] / [STG] / [PROD]</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="feat-title">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="feature-row">
            <div class="row-icon" style="background:rgba(146,86,217,0.1);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9256D9" stroke-width="2.5">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </div>
            <div class="row-text">
              <div class="row-title">Emoji in title</div>
              <div class="row-sub">Prepend 🔵🟠🔴 to page title</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="feat-emoji">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </section>

    <!-- Programs & Environments -->
    <section class="accordion-section" id="section-programs">
      <button class="accordion-header" aria-expanded="true" data-target="body-programs">
        Programs &amp; Environments
        <span class="accordion-arrow">▾</span>
      </button>
      <div class="accordion-body" id="body-programs">
        <div id="programs-list"></div>
        <button id="add-program" class="btn-primary">+ Add Program</button>
      </div>
    </section>

    <!-- Fallback Patterns -->
    <section class="accordion-section" id="section-fallback">
      <button class="accordion-header" aria-expanded="false" data-target="body-fallback">
        Fallback Hostname Patterns
        <span class="accordion-arrow">▸</span>
      </button>
      <div class="accordion-body collapsed" id="body-fallback">
        <p class="section-hint">Regex patterns matched against the hostname when no program URL matches.</p>
        <div id="fallback-list"></div>
        <button id="add-fallback" class="btn-secondary">+ Add Pattern</button>
      </div>
    </section>

    <!-- Export / Import -->
    <section class="accordion-section" id="section-export">
      <button class="accordion-header" aria-expanded="false" data-target="body-export">
        Export / Import
        <span class="accordion-arrow">▸</span>
      </button>
      <div class="accordion-body collapsed" id="body-export">
        <div class="export-row">
          <button id="btn-export" class="btn-secondary">⬇ Export Config</button>
          <label class="btn-secondary btn-file-label" for="btn-import">⬆ Import Config</label>
          <input type="file" id="btn-import" accept=".json">
        </div>
      </div>
    </section>

    <div id="status-message" class="status-message hidden"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
